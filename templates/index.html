<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Farming Insights</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;700&family=Mulish:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="page">
        <header class="hero">
            <p class="hero-kicker">DBMS Project</p>
            <h1>Smart Farming Insights</h1>
            <p class="hero-subtitle">Choose an analysis card to run a stored query and view the result.</p>
        </header>

        <section>
            <h2 class="section-title">Available Analyses</h2>
            <div id="queryGrid" class="query-grid"></div>
        </section>

        <section class="result-panel">
            <div class="result-head">
                <h2 id="resultTitle">Result Panel</h2>
                <p id="resultMeta">Select any analysis card above.</p>
            </div>
            <div id="resultArea" class="result-area">
                <p class="placeholder">No analysis has been executed yet.</p>
            </div>
        </section>
    </main>

    <script>
        const queryDefinitions = [
            {
                title: "Top Region",
                subtitle: "Region with highest average yield",
                endpoint: "/top-region",
                columns: ["Region", "Average Yield"]
            },
            {
                title: "Top 5 Crops",
                subtitle: "Crops ranked by average yield",
                endpoint: "/top-crops",
                columns: ["Crop", "Average Yield"]
            },
            {
                title: "Yield by Region",
                subtitle: "Average yield across all regions",
                endpoint: "/avg-yield-region",
                columns: ["Region", "Average Yield"]
            },
            {
                title: "Rainy Weather Crops",
                subtitle: "Crops observed under rainy condition",
                endpoint: "/rainy-crops",
                columns: ["Crop"]
            },
            {
                title: "Fertilizer Usage",
                subtitle: "Total records where fertilizer was used",
                endpoint: "/fertilizer-count",
                columns: ["Count"]
            },
            {
                title: "Irrigation Usage",
                subtitle: "Total records where irrigation was used",
                endpoint: "/irrigation-count",
                columns: ["Count"]
            },
            {
                title: "Best Soil Type",
                subtitle: "Soil type with highest average yield",
                endpoint: "/best-soil",
                columns: ["Soil", "Average Yield"]
            },
            {
                title: "Fast Harvest Crops",
                subtitle: "Crops with harvest under 100 days",
                endpoint: "/fast-harvest-crops",
                columns: ["Crop"]
            },
            {
                title: "Records per Region",
                subtitle: "How many records each region has",
                endpoint: "/records-per-region",
                columns: ["Region", "Count"]
            },
            {
                title: "Highest Yield Record",
                subtitle: "Single best-performing farm record",
                endpoint: "/highest-yield",
                columns: ["ID", "Region ID", "Crop ID", "Soil ID", "Rainfall", "Temperature", "Fertilizer", "Irrigation", "Weather", "Harvest Days", "Yield"]
            }
        ];

        const queryGrid = document.getElementById("queryGrid");
        const resultArea = document.getElementById("resultArea");
        const resultTitle = document.getElementById("resultTitle");
        const resultMeta = document.getElementById("resultMeta");

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function normalizeRows(data) {
            if (!Array.isArray(data)) {
                return [];
            }
            return data;
        }

        function renderTable(rows, columns) {
            if (!rows.length) {
                resultArea.innerHTML = '<p class="placeholder">No data matched this analysis.</p>';
                return;
            }

            const firstRow = rows[0];
            const isObjectRow = typeof firstRow === "object" && firstRow !== null && !Array.isArray(firstRow);

            let headers = [];
            let matrix = [];

            if (isObjectRow) {
                headers = Object.keys(firstRow);
                matrix = rows.map(row => headers.map(key => row[key]));
            } else {
                const width = Array.isArray(firstRow) ? firstRow.length : 1;
                headers = columns.length === width
                    ? columns
                    : Array.from({ length: width }, (_, i) => `Column ${i + 1}`);
                matrix = rows.map(row => (Array.isArray(row) ? row : [row]));
            }

            const headerHtml = headers.map(head => `<th>${escapeHtml(head)}</th>`).join("");
            const bodyHtml = matrix
                .map(row => `<tr>${row.map(cell => `<td>${escapeHtml(cell ?? "-")}</td>`).join("")}</tr>`)
                .join("");

            resultArea.innerHTML = `
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>${headerHtml}</tr>
                        </thead>
                        <tbody>${bodyHtml}</tbody>
                    </table>
                </div>
            `;
        }

        async function runQuery(query, cardElement) {
            document.querySelectorAll(".query-card").forEach(card => card.classList.remove("active"));
            cardElement.classList.add("active");

            resultTitle.textContent = query.title;
            resultMeta.textContent = "Running analysis...";
            resultArea.innerHTML = '<p class="placeholder">Loading data...</p>';

            try {
                const response = await fetch(query.endpoint);
                if (!response.ok) {
                    throw new Error(`Server responded with ${response.status}`);
                }

                const rows = normalizeRows(await response.json());
                resultMeta.textContent = `Retrieved ${rows.length} row(s).`;
                renderTable(rows, query.columns || []);
            } catch (error) {
                resultMeta.textContent = "Could not run this analysis.";
                resultArea.innerHTML = `<p class="error">${escapeHtml(error.message)}</p>`;
            }
        }

        queryDefinitions.forEach(query => {
            const card = document.createElement("article");
            card.className = "query-card";
            card.innerHTML = `
                <h3>${escapeHtml(query.title)}</h3>
                <p>${escapeHtml(query.subtitle)}</p>
                <button class="run-btn" type="button">Run Analysis</button>
            `;
            card.querySelector("button").addEventListener("click", () => runQuery(query, card));
            queryGrid.appendChild(card);
        });
    </script>
</body>
</html>
